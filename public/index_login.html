<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SAUDINOB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { color: #0a5c91; font-size: 1.8rem; font-weight: 800; }
    .logo p  { color: #6b7280; font-size: 0.85rem; margin-top: 4px; }
    label { display: block; font-size: 0.88rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 0.95rem; margin-bottom: 18px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #0a5c91; }
    button {
      width: 100%; padding: 12px;
      background: #0a5c91; color: #fff;
      border: none; border-radius: 6px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #074870; }
    .msg {
      margin-top: 14px; padding: 10px 14px;
      border-radius: 6px; font-size: 0.88rem; display: none;
    }
    .msg.erro  { background: #fee2e2; color: #b91c1c; }
    .msg.ok    { background: #dcfce7; color: #15803d; }
    .back { text-align: center; margin-top: 20px; font-size: 0.85rem; }
    .back a { color: #0a5c91; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>SAUDINOB</h1>
      <p>Sistema de Gestão Clínica</p>
    </div>
    <form id="form">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="utilizador@saudinob.pt" required />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" required />

      <button type="submit">Entrar</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="back"><a href="index.html">← Voltar ao início</a></div>
  </div>

  <script>
    const API = 'http://localhost:3000';

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.style.display = 'none';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.erro || 'Erro ao autenticar.';
          msg.className = 'msg erro';
          msg.style.display = 'block';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.utilizador));

        msg.textContent = `Bem-vindo, ${data.utilizador.nome}! A redirecionar...`;
        msg.className = 'msg ok';
        msg.style.display = 'block';

        setTimeout(() => {
          const perfil = data.utilizador.perfil;
          if (perfil === 'UTENTE')         window.location.href = 'index_dashboard.html';
          else if (perfil === 'MEDICO')    window.location.href = 'index_utentes.html';
          else                             window.location.href = 'index_utentes.html';
        }, 800);

      } catch {
        msg.textContent = 'Não foi possível ligar ao servidor.';
        msg.className = 'msg erro';
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
